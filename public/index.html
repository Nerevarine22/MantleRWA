<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mantle RWA</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main class="hero">
      <section class="card">
        <p class="eyebrow">Node.js Local Launch</p>
        <h1>Mantle RWA</h1>
        <p class="lead">
          Локальна сторінка вже готова до запуску. Це стартовий шаблон, який
          можна далі розширити під реальний сайт.
        </p>
        <div class="actions">
          <a class="button primary" href="http://127.0.0.1:3000">Відкрити сайт</a>
          <button class="button secondary" id="statusButton">Перевірити статус</button>
        </div>
        <p class="status" id="statusText">Сервер ще не перевіряли.</p>
      </section>
    </main>

    <script src="/script.js"></script>
  </body>
  </html>
