<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mantle RWA Intelligence Hub</title>
    <link rel="stylesheet" href="/style.css?v=2" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <nav class="nav-list" aria-label="Primary">
          <a class="nav-item nav-item-active" href="#market">Portfolio</a>
          <a class="nav-item" href="#copilot">Learn RWA</a>
          <a class="nav-item" href="#yield-strip">Find Yield</a>
          <a class="nav-item" href="#news">Historical Data</a>
        </nav>
      </aside>

      <main class="main-panel">
        <section class="board-block glass board-top" id="market">
          <div class="board-head board-head-split">
            <h2 class="board-title">Treasuries & Commodities</h2>
            <h2 class="board-title">Tokenized Stocks</h2>
          </div>
          <div class="market-grids">
            <div class="price-grid" id="treasuriesGrid"></div>
            <div class="price-grid" id="stocksGrid"></div>
          </div>
        </section>

        <section class="board-strip glass" id="yield-strip">
          <div class="strip-item">Yield Opportunities</div>
          <div class="strip-item">Market Snapshot</div>
        </section>

        <section class="content-grid">
          <section class="board-block glass board-chat" id="copilot">
            <h2 class="board-title">CHAT AI</h2>
            <div class="chat-shell">
              <div class="chat-messages" id="chatMessages">
                <div class="chat-bubble bubble-bot">Hello! I am your RWA Copilot. Ask me about tokenized stocks or Mantle DeFi strategies.</div>
              </div>
              <div class="chat-input-area">
                <input type="text" class="chat-input" id="chatInput" placeholder="Ask Copilot..." />
                <button class="chat-send-btn" id="chatSendBtn">
                  <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                </button>
              </div>
            </div>
          </section>

          <section class="board-block glass board-news" id="news">
            <h2 class="board-title">Top News - Market Trends</h2>
            <div class="news-stack" id="newsFeed">
              <article class="news-row"></article>
            </div>
          </section>
        </section>
      </main>
    </div>

    <script src="/script.js?v=2"></script>
  </body>
</html>
